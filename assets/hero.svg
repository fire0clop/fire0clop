<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Egor Fomenko — iOS and Backend Engineer">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#22d3ee;#a855f7;#7c3aed" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#7c3aed;#22d3ee;#a855f7" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#a855f7;#7c3aed;#22d3ee" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e11d8f" stop-opacity="0.30"/><stop offset="1" stop-color="#e11d8f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0b14"/><stop offset="1" stop-color="#050509"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
    <style>
      .name { font-family: 'Playfair Display','Georgia','Times New Roman',serif; }
      .mono { font-family: ui-monospace,'SF Mono','JetBrains Mono','Menlo',monospace; }
      @keyframes twk  { 0%,100%{opacity:.15;} 50%{opacity:.9;} }
      @keyframes car  { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
      @keyframes glow { 0%,100%{opacity:.85;} 50%{opacity:1;} }
      .tw  { animation: twk 3.4s ease-in-out infinite; }
      .car { animation: car 1.05s step-end infinite; }
      .gl  { animation: glow 5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="340" rx="18" fill="url(#vignette)"/>
  <rect x="1" y="1" width="1198" height="338" rx="17" fill="none" stroke="#1c2233" stroke-width="1"/>

  <!-- drifting aurora -->
  <g filter="url(#soft)">
    <ellipse cx="250" cy="120" rx="230" ry="150" fill="url(#blobA)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 60 30; -20 -10; 0 0" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="900" cy="230" rx="260" ry="170" fill="url(#blobB)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -50 -25; 30 15; 0 0" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="640" cy="60" rx="220" ry="130" fill="url(#blobC)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 25 40; -35 -15; 0 0" dur="26s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- starfield -->
  <g fill="#dfe7ff">
    <circle class="tw" cx="120" cy="70" r="1.3" style="animation-delay:.2s"/>
    <circle class="tw" cx="360" cy="250" r="1.1" style="animation-delay:1.1s"/>
    <circle class="tw" cx="520" cy="120" r="1.4" style="animation-delay:.6s"/>
    <circle class="tw" cx="720" cy="292" r="1.0" style="animation-delay:1.8s"/>
    <circle class="tw" cx="815" cy="86" r="1.3" style="animation-delay:.9s"/>
    <circle class="tw" cx="1150" cy="150" r="1.2" style="animation-delay:2.3s"/>
    <circle class="tw" cx="470" cy="300" r="1.0" style="animation-delay:2.9s"/>
    <circle class="tw" cx="60" cy="210" r="1.1" style="animation-delay:2.0s"/>
    <circle class="tw" cx="1120" cy="300" r="1.2" style="animation-delay:1.4s"/>
    <circle class="tw" cx="690" cy="150" r="1.0" style="animation-delay:.5s"/>
  </g>

  <!-- orbit rings (right) -->
  <g transform="translate(1050 170)" class="gl">
    <g fill="none" stroke="url(#aurora)" stroke-width="1.7">
      <circle r="112" opacity="0.4"/>
      <ellipse rx="112" ry="43" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="112" ry="43" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="21s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="112" ry="43" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="26s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <circle r="6.5" fill="#22d3ee"/>
    <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
       <circle r="3.6" fill="#d4af37" cx="112" cy="0"/></g>
  </g>

  <!-- gold luxury corner ticks -->
  <g stroke="#d4af37" stroke-width="1.5" opacity="0.85">
    <path d="M30 46 L30 28 L48 28"/><path d="M1170 46 L1170 28 L1152 28"/>
    <path d="M30 294 L30 312 L48 312"/><path d="M1170 294 L1170 312 L1152 312"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(74 150)">
    <text class="name" x="0" y="0" font-size="60" font-weight="700" letter-spacing="1" fill="#f5f3ff">EGOR<tspan fill="url(#aurora)"> FOMENKO</tspan></text>
    <line x1="4" y1="26" x2="742" y2="26" stroke="#d4af37" stroke-width="1.6" opacity="0.9"/>
    <text class="mono" x="4" y="62" font-size="19" letter-spacing="4.5" fill="#9fb3d1">iOS<tspan fill="#d4af37"> · </tspan>BACKEND<tspan fill="#d4af37"> · </tspan>SYSTEMS ENGINEER</text>
    <rect class="car" x="686" y="46" width="10" height="20" fill="#22d3ee"/>
  </g>
</svg>
