<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Egor Fomenko — iOS and Backend Engineer, six shipped products">
<defs>
 <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#10131c"/><stop offset="1" stop-color="#080a10"/></linearGradient>
 <radialGradient id="vig" cx="0.5" cy="0.15" r="0.9"><stop offset="0" stop-color="#1a2033" stop-opacity="0.55"/><stop offset="1" stop-color="#1a2033" stop-opacity="0"/></radialGradient>
 <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#7f8db0" opacity="0.06"/></pattern>
 <linearGradient id="t_gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e8b84a"/><stop offset="1" stop-color="#c8952a"/></linearGradient>
 <linearGradient id="t_sib" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f6bff"/><stop offset="1" stop-color="#5e5ce6"/></linearGradient>
 <linearGradient id="t_vpn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d7ce2"/><stop offset="1" stop-color="#27b6e8"/></linearGradient>
 <linearGradient id="t_klio" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe1ec"/><stop offset="1" stop-color="#dde6fc"/></linearGradient>
 <linearGradient id="t_flame" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#ff7db0"/><stop offset="1" stop-color="#ffbf74"/></linearGradient>
 <linearGradient id="t_org" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffb14e"/><stop offset="1" stop-color="#ff8a00"/></linearGradient>
 <linearGradient id="t_coral" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff5a2c"/><stop offset="1" stop-color="#ff8f5e"/></linearGradient>
 <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5e5ce6"/><stop offset="1" stop-color="#27b6e8"/></linearGradient>
 <style>
    .sans{font-family:-apple-system,'Helvetica Neue','Inter',Arial,sans-serif;}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes tw{0%,100%{opacity:.12}50%{opacity:.7}}
    .fl{animation:fl 4.5s ease-in-out infinite}
    .tw{animation:tw 4s ease-in-out infinite}
</style>
</defs>

<rect width="1200" height="300" rx="20" fill="url(#bg)"/>
<rect width="1200" height="300" rx="20" fill="url(#dots)"/>
<rect width="1200" height="300" rx="20" fill="url(#vig)"/>
<g fill="#cfe0ff">
 <circle class="tw" cx="140" cy="60" r="1.1" style="animation-delay:.3s"/>
 <circle class="tw" cx="1060" cy="70" r="1.1" style="animation-delay:1.4s"/>
 <circle class="tw" cx="600" cy="40" r="1.0" style="animation-delay:.8s"/>
</g>

<text x="600" y="74" text-anchor="middle" font-size="52" font-weight="800" letter-spacing="1" fill="#f4f7ff" class="sans">EGOR FOMENKO</text>
<rect x="566" y="90" width="68" height="3" rx="1.5" fill="url(#acc)"/>
<text x="600" y="120" text-anchor="middle" font-size="15" font-weight="500" letter-spacing="1" fill="#98a6c4" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">iOS &amp; BACKEND ENGINEER  ·  6 PRODUCTS SHIPPED END TO END</text>

  <g transform="translate(288 150)"><g class="fl" style="animation-delay:0.00s"><rect x="4" y="4" width="76" height="76" rx="18" fill="url(#t_sib)"/><g><rect x="20" y="24" width="44" height="26" rx="9" fill="#ffffff" opacity="0.96"/><path d="M26 48 L22 60 L38 48 Z" fill="#ffffff" opacity="0.96"/><circle cx="33" cy="37" r="3" fill="#2f6bff"/><circle cx="42" cy="37" r="3" fill="#2f6bff"/><circle cx="51" cy="37" r="3" fill="#2f6bff"/></g></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">SIBERIA</text></g>
  <g transform="translate(396 150)"><g class="fl" style="animation-delay:0.25s"><rect x="4" y="4" width="76" height="76" rx="18" fill="#0a0e1a"/><rect x="10" y="10" width="64" height="64" rx="14" fill="none" stroke="url(#t_gold)" stroke-width="1.6"/><text x="42" y="60" text-anchor="middle" font-size="52" font-style="italic" font-weight="500" fill="url(#t_gold)" style="font-family:'Playfair Display','Georgia',serif;">J</text></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">JOKER</text></g>
  <g transform="translate(504 150)"><g class="fl" style="animation-delay:0.50s"><rect x="4" y="4" width="76" height="76" rx="18" fill="url(#t_vpn)"/><g stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" fill="none"><path d="M42 46 L42 36 L24 24"/><path d="M42 36 L60 24"/><path d="M42 46 L42 64"/></g><circle cx="22" cy="22" r="8.5" fill="#fff"/><circle cx="62" cy="22" r="8.5" fill="#fff"/><circle cx="42" cy="66" r="8.5" fill="#fff"/><circle cx="42" cy="41" r="3.2" fill="#3f8fe0"/></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">TOP-VPN</text></g>
  <g transform="translate(612 150)"><g class="fl" style="animation-delay:0.75s"><rect x="4" y="4" width="76" height="76" rx="18" fill="url(#t_klio)"/><g transform="translate(42 30)"><path d="M0 40 C-16 26 -6 12 4 4 C5 15 15 12 14 2 C26 12 32 26 26 40 C22 50 6 52 0 40 Z" fill="url(#t_flame)"/><path d="M6 36 C0 30 3 21 8 16 C9 24 15 22 15 16 C21 22 21 32 15 37 C11 41 10 40 6 36 Z" fill="#ffffff" opacity="0.5"/></g></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">KLIO</text></g>
  <g transform="translate(720 150)"><g class="fl" style="animation-delay:1.00s"><rect x="4" y="4" width="76" height="76" rx="18" fill="#341200"/><g fill="url(#t_org)"><rect x="22" y="28" width="40" height="9" rx="4.5"/><rect x="22" y="41" width="26" height="9" rx="4.5"/><rect x="52" y="41" width="10" height="9" rx="4.5"/><rect x="22" y="54" width="40" height="9" rx="4.5"/></g></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">MEDOED</text></g>
  <g transform="translate(828 150)"><g class="fl" style="animation-delay:1.25s"><rect x="4" y="4" width="76" height="76" rx="18" fill="#faf6ed"/><g transform="translate(42 30)"><path d="M0 40 C-13 18 -15 9 -15 3 A15 15 0 0 1 15 3 C15 9 13 18 0 40 Z" fill="url(#t_coral)"/><circle cx="0" cy="2" r="6.5" fill="#faf6ed"/></g></g><text x="42" y="102" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#6b7688" style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;">ACTIVITY</text></g>
</svg>
