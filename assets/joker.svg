<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Joker — multiplayer card game">
<defs>
<linearGradient id="jbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070b16"/><stop offset="1" stop-color="#0e1526"/></linearGradient>
<linearGradient id="jgold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e8b84a"/><stop offset="1" stop-color="#c8952a"/></linearGradient>
<radialGradient id="jglow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#c8952a" stop-opacity="0.28"/><stop offset="1" stop-color="#c8952a" stop-opacity="0"/></radialGradient>
<filter id="jsoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="24"/></filter>
<style>@keyframes gl{0%,100%{opacity:.85}50%{opacity:1}} .gl{animation:gl 5s ease-in-out infinite}</style>
</defs>
<rect width="1200" height="240" rx="20" fill="url(#jbg)"/>
<ellipse cx="980" cy="120" rx="260" ry="150" fill="url(#jglow)" filter="url(#jsoft)"/>
<rect x="16" y="16" width="1168" height="208" rx="14" fill="none" stroke="url(#jgold)" stroke-width="1.5" opacity="0.8"/>
<!-- gold serif J monogram (like the app icon) -->
<g transform="translate(1010 120)" class="gl">
 <rect x="-70" y="-70" width="140" height="140" rx="20" fill="none" stroke="url(#jgold)" stroke-width="2.2"/>
 <text x="0" y="46" text-anchor="middle" font-size="150" font-style="italic" font-weight="500" fill="url(#jgold)" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;">J</text>
</g>
<!-- suit accents -->
<text x="150" y="86" font-size="22" fill="#aa2828" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;" opacity="0.85">♥</text>
<text x="182" y="86" font-size="22" fill="#c8952a" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;" opacity="0.7">♠</text>
<g transform="translate(74 128)">
 <text x="0" y="0" font-size="60" font-weight="700" fill="url(#jgold)" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;">Joker</text>
 <rect x="4" y="20" width="300" height="1.5" fill="#c8952a" opacity="0.7"/>
 <text x="4" y="50" font-size="16" font-weight="500" letter-spacing="2" fill="#f0e6d2" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;">SERVER-AUTHORITATIVE MULTIPLAYER CARD GAME</text>
</g>
</svg>