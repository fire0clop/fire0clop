<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Activity — location-based meetups">
<defs>
<linearGradient id="acoral" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff5a2c"/><stop offset="1" stop-color="#ff8f5e"/></linearGradient>
<filter id="apin" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c23a12" flood-opacity="0.25"/></filter>
<style>@keyframes rp{0%{r:14;opacity:.8}100%{r:52;opacity:0}} .rp{animation:rp 3s ease-out infinite} @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}} .fl{animation:fl 3.6s ease-in-out infinite}</style>
</defs>
<rect width="1200" height="240" rx="20" fill="#faf6ed"/>
<rect x="0.75" y="0.75" width="1198.5" height="238.5" rx="19" fill="none" stroke="#e7e0d0"/>
