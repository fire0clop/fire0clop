 <text x="2" y="102" font-size="17" font-weight="500" fill="#6f6a5d" font-style="italic" style="font-family:'Playfair Display','Georgia','Times New Roman',serif;">Post any activity · find people nearby · real-time chat</text>
 <g transform="translate(4 126)"><circle cx="0" cy="0" r="7" fill="#2989ff"/><circle cx="30" cy="0" r="7" fill="#26b36b"/><circle cx="60" cy="0" r="7" fill="#7d5cff"/><circle cx="90" cy="0" r="7" fill="#f2a011"/><circle cx="120" cy="0" r="7" fill="#0eb5a3"/></g>
</g>
